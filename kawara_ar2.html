<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kawara-nyan AR</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Hiragino Maru Gothic ProN','M PLUS Rounded 1c',sans-serif; }

  #overlay {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    pointer-events:none;
  }

  #reticle {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:64px; height:64px;
    border:2px solid rgba(74,144,217,0.9);
    border-radius:50%;
    display:none;
    z-index:20;
    animation:reticlePulse 1.5s ease-in-out infinite;
  }
  #reticle::before {
    content:''; position:absolute; inset:6px;
    border:1px solid rgba(74,144,217,0.5);
    border-radius:50%;
  }
  #reticle::after {
    content:''; position:absolute;
    top:50%; left:50%; transform:translate(-50%,-50%);
    width:6px; height:6px;
    background:rgba(74,144,217,0.9);
    border-radius:50%;
  }
  @keyframes reticlePulse {
    0%,100% { box-shadow:0 0 0 0 rgba(74,144,217,0.4); }
    50%     { box-shadow:0 0 0 12px rgba(74,144,217,0); }
  }

  #speech {
    position:fixed; top:60px; left:50%;
    transform:translateX(-50%);
    background:rgba(10,25,60,0.92);
    border:1.5px solid rgba(74,144,217,0.8);
    border-radius:16px;
    padding:12px 20px;
    color:#f0f8ff;
    font-size:14px;
    line-height:1.6;
    text-align:center;
    max-width:280px;
    backdrop-filter:blur(8px);
    visibility:hidden; opacity:0;
    pointer-events:none;
    z-index:30;
    transition:opacity 0.3s ease, visibility 0s linear 0.3s;
  }
  #speech.show {
    visibility:visible; opacity:1;
    transition:opacity 0.3s ease, visibility 0s linear 0s;
  }
  #speech::after {
    content:''; position:absolute;
    bottom:-12px; left:50%; transform:translateX(-50%);
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-top:12px solid rgba(74,144,217,0.8);
  }
  .hi  { color:#4a90d9; font-weight:700; }
  .hi2 { color:#f5901e; font-weight:700; }

  #bottom-ui {
    width:100%; padding:0 0 48px;
    display:flex; flex-direction:column;
    align-items:center; gap:16px;
    pointer-events:auto;
  }

  #hint {
    background:rgba(0,0,0,0.65);
    border:1px solid rgba(74,144,217,0.4);
    border-radius:24px;
    padding:10px 24px;
    color:#b8d8f0;
    font-size:13px;
    backdrop-filter:blur(6px);
    text-align:center;
  }

  #start-btn {
    background:linear-gradient(135deg,#1a3a6b,#2255a0);
    border:none; border-radius:50px;
    color:#f0f8ff; font-size:16px; font-weight:700;
    padding:16px 44px;
    box-shadow:0 0 32px rgba(74,144,217,0.6);
    cursor:pointer;
    letter-spacing:0.05em;
    animation:btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%,100% { box-shadow:0 0 24px rgba(74,144,217,0.5); }
    50%     { box-shadow:0 0 44px rgba(110,198,240,0.8); }
  }

  #tap-hint {
    color:#b8d8f0; font-size:14px;
    background:rgba(0,0,0,0.55);
    border-radius:20px; padding:8px 20px;
    border:1px solid rgba(74,144,217,0.3);
    display:none;
  }

  #action-btns {
    display:none; gap:10px; flex-wrap:wrap; justify-content:center;
  }
  .action-btn {
    background:rgba(10,25,60,0.85);
    border:1.5px solid rgba(74,144,217,0.6);
    border-radius:50px;
    color:#b8d8f0; font-size:13px; font-weight:700;
    padding:9px 18px; cursor:pointer;
    backdrop-filter:blur(6px);
  }
  .action-btn.orange {
    border-color:rgba(245,144,30,0.6);
    color:#fcd9a0;
  }

  #not-supported {
    position:fixed; inset:0;
    background:#050f1e;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    color:#f0f8ff; text-align:center;
    padding:40px; z-index:100;
    gap:16px;
  }
  #not-supported h2 { color:#4a90d9; font-size:20px; }
  #not-supported p  { color:#6baed6; font-size:14px; line-height:1.7; }
  #not-supported .emoji { font-size:48px; }

  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>

<div id="not-supported">
  <div class="emoji">📱</div>
  <h2>WebARを起動できませんでした</h2>
</div>

<div id="overlay">
  <div id="reticle"></div>
  <div id="speech"></div>

  <div id="bottom-ui">
    <div id="hint">📱 ARカメラを起動してKawara-nyanを召喚！</div>
    <button id="start-btn" onclick="startAR()">✨ ARを起動する</button>
    <div id="tap-hint">📍 地面をタップしてKawara-nyanを配置</div>
    <div id="action-btns">
      <button class="action-btn" onclick="doGreet()">👋 あいさつ</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

let camera, scene, renderer, xrSession, hitTestSource, hitTestSourceReq;
let reticleObj, kawaraGroup, placed = false;
let clock;
let speechTimer = null;

const speechEl   = document.getElementById('speech');
const reticleEl  = document.getElementById('reticle');
const tapHint    = document.getElementById('tap-hint');
const actionBtns = document.getElementById('action-btns');
const startBtn   = document.getElementById('start-btn');
const hintEl     = document.getElementById('hint');

// ── WebXR 対応チェック ──────────────────────────────────────────────
window.startAR = async function() {
  if (!navigator.xr) { showNotSupported(); return; }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if (!supported) { showNotSupported(); return; }

  startBtn.style.display = 'none';
  hintEl.style.display   = 'none';

  initThree();
  await startXRSession();
};

function showNotSupported() {
  document.getElementById('not-supported').style.display = 'flex';
}

// ── Three.js 初期化 ─────────────────────────────────────────────────
function initThree() {
  scene    = new THREE.Scene();
  clock    = new THREE.Clock();
  camera   = new THREE.PerspectiveCamera();
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  const ambient = new THREE.AmbientLight(0xf0f8ff, 1.2);
  scene.add(ambient);

  const reticleGeo = new THREE.RingGeometry(0.04, 0.06, 32).rotateX(-Math.PI/2);
  const reticleMat = new THREE.MeshBasicMaterial({ color:0x4a90d9, side:THREE.DoubleSide });
  reticleObj = new THREE.Mesh(reticleGeo, reticleMat);
  reticleObj.matrixAutoUpdate = false;
  reticleObj.visible = false;
  scene.add(reticleObj);

  kawaraGroup = buildKawara();
  kawaraGroup.visible = false;
  scene.add(kawaraGroup);

  // セットアップ完了フラグ
  posesReady = true;
}

// ── 画像を読み込んでスプライト化 ─────────────────────────
function buildKawara() {
  const group = new THREE.Group();
  
  // TextureLoaderでWebP画像を読み込み
  const loader = new THREE.TextureLoader();
  const tex = loader.load('./kawaranyan.webp');
  tex.premultiplyAlpha = true;

  const mat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    sizeAttenuation: true,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.55, 0.82, 1);
  sprite.position.y = 0.41;
  group.add(sprite);

  // 足元の光の輪
  const ringGeo = new THREE.RingGeometry(0.08, 0.13, 32).rotateX(-Math.PI/2);
  const ringMat = new THREE.MeshBasicMaterial({ color:0x4a90d9, side:THREE.DoubleSide, transparent:true, opacity:0.55 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.y = 0.005;
  group.add(ring);

  group.userData.baseY  = 0;
  group.userData.t      = 0;
  group.userData.ring   = ring;
  group.userData.sprite = sprite;

  return group;
}

// ── ダミー処理（コードを壊さないため） ─────────────────────────
let posesReady = false;
function preloadPoses() { posesReady = true; }
function setPose(pose) { }
window.doGreet = function() {
  kawara_say('にゃ！Kawara-nyanです！');
};

// ── WebXR セッション開始 ────────────────────────────────────────────
async function startXRSession() {
  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.getElementById('overlay') }
    });
  } catch(e) {
    showNotSupported();
    return;
  }

  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);

  const refSpace = await xrSession.requestReferenceSpace('viewer');
  hitTestSourceReq = await xrSession.requestHitTestSource({ space: refSpace });

  reticleEl.style.display = 'block';
  tapHint.style.display   = 'block';

  xrSession.addEventListener('select', onSelect);
  renderer.setAnimationLoop(renderXR);
}

function onSelect() {
  if (!reticleObj.visible) return;
  if (!placed) {
    kawaraGroup.visible = true;
    placed = true;
    tapHint.style.display    = 'none';
    actionBtns.style.display = 'flex';
    kawara_say('ここに召喚されたにゃ！✨');
  }
  kawaraGroup.position.setFromMatrixPosition(reticleObj.matrix);
  kawaraGroup.userData.baseY = kawaraGroup.position.y;
}

function renderXR(timestamp, frame) {
  const dt = clock.getDelta();
  if (frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    const hitTestResults = frame.getHitTestResults(hitTestSourceReq);
    if (hitTestResults.length > 0) {
      const hit  = hitTestResults[0];
      const pose = hit.getPose(refSpace);
      reticleObj.visible = true;
      reticleObj.matrix.fromArray(pose.transform.matrix);
    } else {
      reticleObj.visible = false;
    }
  }

  if (placed && kawaraGroup.visible) {
    kawaraGroup.userData.t += dt;
    const floatY = Math.sin(kawaraGroup.userData.t * 1.4) * 0.03;
    kawaraGroup.position.y = kawaraGroup.userData.baseY + floatY;
    const ringScale = 1 - floatY * 6;
    kawaraGroup.userData.ring.scale.set(ringScale, ringScale, ringScale);
  }
  renderer.render(scene, camera);
}

window.kawara_say = function(text) {
  speechEl.innerHTML = text;
  speechEl.classList.add('show');
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => { speechEl.classList.remove('show'); }, 3000);
};
</script>
</body>
</html>
