<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kawara-nyan AR</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Hiragino Maru Gothic ProN','M PLUS Rounded 1c',sans-serif; }

  #overlay {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    pointer-events:none;
  }

  /* 中央の照準リング */
  #reticle {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:64px; height:64px;
    border:2px solid rgba(74,144,217,0.9);
    border-radius:50%;
    display:none;
    z-index:20;
    animation:reticlePulse 1.5s ease-in-out infinite;
  }
  #reticle::before {
    content:''; position:absolute; inset:6px;
    border:1px solid rgba(74,144,217,0.5);
    border-radius:50%;
  }
  #reticle::after {
    content:''; position:absolute;
    top:50%; left:50%; transform:translate(-50%,-50%);
    width:6px; height:6px;
    background:rgba(74,144,217,0.9);
    border-radius:50%;
  }
  @keyframes reticlePulse {
    0%,100% { box-shadow:0 0 0 0 rgba(74,144,217,0.4); }
    50%      { box-shadow:0 0 0 12px rgba(74,144,217,0); }
  }

  #speech {
    position:fixed; top:60px; left:50%;
    transform:translateX(-50%);
    background:rgba(10,25,60,0.92);
    border:1.5px solid rgba(74,144,217,0.8);
    border-radius:16px;
    padding:12px 20px;
    color:#f0f8ff;
    font-size:14px;
    line-height:1.6;
    text-align:center;
    max-width:280px;
    backdrop-filter:blur(8px);
    visibility:hidden; opacity:0;
    pointer-events:none;
    z-index:30;
    transition:opacity 0.3s ease, visibility 0s linear 0.3s;
  }
  #speech.show {
    visibility:visible; opacity:1;
    transition:opacity 0.3s ease, visibility 0s linear 0s;
  }
  #speech::after {
    content:''; position:absolute;
    bottom:-12px; left:50%; transform:translateX(-50%);
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-top:12px solid rgba(74,144,217,0.8);
  }
  .hi  { color:#4a90d9; font-weight:700; }
  .hi2 { color:#f5901e; font-weight:700; }

  /* 下部UI */
  #bottom-ui {
    width:100%; padding:0 0 48px;
    display:flex; flex-direction:column;
    align-items:center; gap:16px;
    pointer-events:auto;
  }

  #hint {
    background:rgba(0,0,0,0.65);
    border:1px solid rgba(74,144,217,0.4);
    border-radius:24px;
    padding:10px 24px;
    color:#b8d8f0;
    font-size:13px;
    backdrop-filter:blur(6px);
    text-align:center;
  }

  #start-btn {
    background:linear-gradient(135deg,#1a3a6b,#2255a0);
    border:none; border-radius:50px;
    color:#f0f8ff; font-size:16px; font-weight:700;
    padding:16px 44px;
    box-shadow:0 0 32px rgba(74,144,217,0.6);
    cursor:pointer;
    letter-spacing:0.05em;
    animation:btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%,100% { box-shadow:0 0 24px rgba(74,144,217,0.5); }
    50%      { box-shadow:0 0 44px rgba(110,198,240,0.8); }
  }

  #tap-hint {
    color:#b8d8f0; font-size:14px;
    background:rgba(0,0,0,0.55);
    border-radius:20px; padding:8px 20px;
    border:1px solid rgba(74,144,217,0.3);
    display:none;
  }

  #action-btns {
    display:none; gap:10px; flex-wrap:wrap; justify-content:center;
  }
  .action-btn {
    background:rgba(10,25,60,0.85);
    border:1.5px solid rgba(74,144,217,0.6);
    border-radius:50px;
    color:#b8d8f0; font-size:13px; font-weight:700;
    padding:9px 18px; cursor:pointer;
    backdrop-filter:blur(6px);
  }
  .action-btn.orange {
    border-color:rgba(245,144,30,0.6);
    color:#fcd9a0;
  }

  /* 非対応メッセージ */
  #not-supported {
    position:fixed; inset:0;
    background:#050f1e;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    color:#f0f8ff; text-align:center;
    padding:40px; z-index:100;
    gap:16px;
  }
  #not-supported h2 { color:#4a90d9; font-size:20px; }
  #not-supported p  { color:#6baed6; font-size:14px; line-height:1.7; }
  #not-supported .emoji { font-size:48px; }

  /* WebXR canvas */
  canvas { display:block; width:100vw; height:100vh; }

  /* キラキラパーティクル */
  .particle {
    position:fixed; pointer-events:none; z-index:25;
    border-radius:50%;
    animation:particleFly 1.2s ease-out forwards;
  }
  @keyframes particleFly {
    0%   { opacity:1; transform:translate(0,0) scale(1); }
    100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0); }
  }

  /* 周辺マップパネル */
  #map-panel {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.85);
    width:min(340px, 90vw);
    background:rgba(5,15,40,0.96);
    border:1.5px solid rgba(74,144,217,0.7);
    border-radius:20px;
    padding:16px;
    z-index:50;
    visibility:hidden;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0.3s;
    backdrop-filter:blur(12px);
    box-shadow:0 0 48px rgba(74,144,217,0.4);
  }
  #map-panel.show {
    visibility:visible; opacity:1; pointer-events:auto;
    transform:translate(-50%,-50%) scale(1);
    transition:opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0s;
  }
  #map-panel h3 {
    color:#4a90d9; font-size:14px; font-weight:700;
    text-align:center; margin-bottom:12px;
    letter-spacing:0.08em;
  }
  #map-panel .close-btn {
    position:absolute; top:10px; right:14px;
    background:none; border:none;
    color:#6baed6; font-size:18px; cursor:pointer;
  }
  #map-panel svg { width:100%; height:auto; display:block; border-radius:10px; }
  .map-road { stroke:#334155; stroke-width:6; fill:none; stroke-linecap:round; }
  .map-road-main { stroke:#475569; stroke-width:10; fill:none; stroke-linecap:round; }
  .map-label { font-size:9px; fill:#e2e8f0; text-anchor:middle; font-family:sans-serif; }
  .map-pin { fill:#f5901e; }
  .map-you { fill:#38bdf8; }
  .route-line { stroke:#f5901e; stroke-width:2.5; fill:none; stroke-dasharray:6,4; stroke-linecap:round; }

  /* 道案内ステップ */
  #route-panel {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.85);
    width:min(320px, 88vw);
    background:rgba(5,15,40,0.96);
    border:1.5px solid rgba(245,144,30,0.7);
    border-radius:20px;
    padding:20px 18px;
    z-index:50;
    visibility:hidden;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0.3s;
    backdrop-filter:blur(12px);
    box-shadow:0 0 48px rgba(245,144,30,0.3);
  }
  #route-panel.show {
    visibility:visible; opacity:1; pointer-events:auto;
    transform:translate(-50%,-50%) scale(1);
    transition:opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0s;
  }
  #route-panel h3 { color:#f5901e; font-size:14px; font-weight:700; text-align:center; margin-bottom:14px; }
  #route-panel .close-btn { position:absolute; top:10px; right:14px; background:none; border:none; color:#6baed6; font-size:18px; cursor:pointer; }
  .route-step {
    display:flex; align-items:center; gap:12px;
    padding:9px 0;
    border-bottom:1px solid rgba(74,144,217,0.12);
    color:#e2e8f0; font-size:13px; line-height:1.5;
  }
  .route-step:last-child { border-bottom:none; }
  .route-icon { font-size:22px; flex-shrink:0; width:32px; text-align:center; }
</style>
</head>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

let camera, scene, renderer, xrSession, hitTestSource, hitTestSourceReq;
let reticleObj, kawaraGroup, placed = false;
let clock;
let speechTimer = null;

const speechEl   = document.getElementById('speech');
const reticleEl  = document.getElementById('reticle');
const tapHint    = document.getElementById('tap-hint');
const actionBtns = document.getElementById('action-btns');
const startBtn   = document.getElementById('start-btn');
const hintEl     = document.getElementById('hint');

// ── WebXR 対応チェック ──────────────────────────────────────────────
window.startAR = async function() {
  if (!navigator.xr) { showNotSupported(); return; }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if (!supported) { showNotSupported(); return; }

  startBtn.style.display = 'none';
  hintEl.style.display   = 'none';

  initThree();
  await startXRSession();
};

function showNotSupported() {
  document.getElementById('not-supported').style.display = 'flex';
}

// ── Three.js 初期化 ─────────────────────────────────────────────────
function initThree() {
  scene    = new THREE.Scene();
  clock    = new THREE.Clock();
  camera   = new THREE.PerspectiveCamera();
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  // ライト
  const ambient = new THREE.AmbientLight(0xf0f8ff, 1.2);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0x4a90d9, 1.0);
  dirLight.position.set(1, 3, 2);
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0xf5901e, 0.4);
  fillLight.position.set(-2, 1, -1);
  scene.add(fillLight);

  // ヒットテスト用レティクル
  const reticleGeo = new THREE.RingGeometry(0.04, 0.06, 32).rotateX(-Math.PI/2);
  const reticleMat = new THREE.MeshBasicMaterial({ color:0x4a90d9, side:THREE.DoubleSide });
  reticleObj = new THREE.Mesh(reticleGeo, reticleMat);
  reticleObj.matrixAutoUpdate = false;
  reticleObj.visible = false;
  scene.add(reticleObj);

  // Kawara-nyanスプライト
  kawaraGroup = buildKawara();
  kawaraGroup.visible = false;
  scene.add(kawaraGroup);

  preloadPoses();
}

// ── Kawara-nyanをCanvasで描いてスプライト化 ─────────────────────────
function buildKawara() {
  const group = new THREE.Group();

  const canvas = document.createElement('canvas');
  canvas.width  = 256;
  canvas.height = 384;
  const ctx = canvas.getContext('2d');

  const svgBlob = new Blob([kawaraSVG()], {type:'image/svg+xml'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 256, 384);
    URL.revokeObjectURL(url);
    tex.needsUpdate = true;
  };
  img.src = url;

  const tex = new THREE.CanvasTexture(canvas);
  tex.premultiplyAlpha = true;

  const mat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    sizeAttenuation: true,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.55, 0.82, 1);
  sprite.position.y = 0.41;
  group.add(sprite);

  // 足元の光の輪（青系）
  const ringGeo = new THREE.RingGeometry(0.08, 0.13, 32).rotateX(-Math.PI/2);
  const ringMat = new THREE.MeshBasicMaterial({ color:0x4a90d9, side:THREE.DoubleSide, transparent:true, opacity:0.55 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.y = 0.005;
  group.add(ring);

  group.userData.baseY  = 0;
  group.userData.t      = 0;
  group.userData.ring   = ring;
  group.userData.sprite = sprite;

  return group;
}

// ── Kawara-nyan SVG（はっぴ姿の猫キャラ） ──────────────────────────
function kawaraSVG() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="512" height="682">
  <defs>
    <!-- 肌色グラデ -->
    <radialGradient id="skin" cx="50%" cy="35%" r="60%">

      <stop offset="100%" stop-color="#ffe8cc"/>

    <!-- 顔の右側ベージュ -->

      <stop offset="0%" stop-color="#f5c5a0"/>
      <stop offset="100%" stop-color="#e8a878"/>
    </radialGradient>
    <!-- はっぴ濃紺 -->
    <linearGradient id="happi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#0f2548"/>
    </linearGradient>
    <!-- 着物グレー -->
    <linearGradient id="kimono" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8d4dc"/>
      <stop offset="100%" stop-color="#a8b8c8"/>
    </linearGradient>
    <!-- 帽子水色 -->
    <linearGradient id="hat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8fd4f8"/>
      <stop offset="100%" stop-color="#5ab8e8"/>
    </linearGradient>
    <!-- 帯オレンジ -->
    <linearGradient id="obi" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8a840"/>
      <stop offset="100%" stop-color="#e07010"/>
    </linearGradient>
    <!-- 足元ライトブルー -->
    <linearGradient id="leg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80c4e8"/>
      <stop offset="100%" stop-color="#5ab0d8"/>
    </linearGradient>
    <!-- 目グラデ -->
    <radialGradient id="eye" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#2255a0"/>
      <stop offset="100%" stop-color="#0a1830"/>
    </radialGradient>
  </defs>

  <!-- ===== 体（着物・はっぴ） ===== -->
  <!-- 着物本体 -->
  <ellipse cx="120" cy="210" rx="45" ry="55" fill="url(#kimono)"/>
  <!-- はっぴ左パネル（濃紺） -->
  <path d="M 80 175 Q 72 185 68 220 Q 66 240 78 245 L 110 248 L 110 190 Q 98 180 80 175 Z" fill="url(#happi)"/>
  <!-- はっぴ右パネル（濃紺） -->
  <path d="M 160 175 Q 168 185 172 220 Q 174 240 162 245 L 130 248 L 130 190 Q 142 180 160 175 Z" fill="url(#happi)"/>
  <!-- 帯（オレンジ） -->
  <rect x="78" y="218" width="84" height="18" rx="6" fill="url(#obi)"/>
  <!-- はっぴ紋（左胸の白丸） -->
  <circle cx="88" cy="200" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="88" cy="200" r="4" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- ===== 脚 ===== -->
  <!-- 左脚（ライトブルー） -->
  <rect x="90" y="252" width="18" height="38" rx="8" fill="url(#leg)"/>
  <!-- 右脚（ライトブルー・跳ね上げ） -->
  <path d="M 132 252 Q 150 256 158 248 Q 165 240 160 232" stroke="url(#leg)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- 左草履（オレンジ） -->
  <ellipse cx="99" cy="292" rx="13" ry="7" fill="url(#obi)"/>
  <!-- 右草履（オレンジ・跳ね） -->
  <ellipse cx="164" cy="232" rx="11" ry="7" fill="url(#obi)" transform="rotate(-30 164 232)"/>

  <!-- ===== 腕 ===== -->
  <!-- 左腕（挙げている、はっぴ） -->
  <path d="M 82 178 Q 60 165 50 145 Q 44 132 50 125" stroke="url(#happi)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- 左手（白い肉球） -->
  <ellipse cx="50" cy="122" rx="13" ry="11" fill="url(#skin)"/>
  <!-- 肉球ピンク -->
  <circle cx="50" cy="125" r="5" fill="#ffb0c0" opacity="0.8"/>
  <circle cx="44" cy="119" r="3" fill="#ffb0c0" opacity="0.6"/>
  <circle cx="56" cy="119" r="3" fill="#ffb0c0" opacity="0.6"/>
  <!-- 右腕（下げ、はっぴ） -->
  <path d="M 158 178 Q 172 188 175 205 Q 177 218 170 222" stroke="url(#happi)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- 右手 -->
  <ellipse cx="170" cy="224" rx="11" ry="10" fill="url(#skin)"/>

  <!-- ===== 首 ===== -->
  <rect x="112" y="148" width="16" height="20" rx="6" fill="url(#skin)"/>

  <!-- ===== 頭 ===== -->
  <!-- 頭全体（丸い） -->
  <ellipse cx="120" cy="105" rx="50" ry="52" fill="url(#skin)"/>
  <!-- 右側のベージュ斑（三毛猫） -->

// ── WebXR セッション開始 ────────────────────────────────────────────
async function startXRSession() {
  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.getElementById('overlay') }
    });
  } catch(e) {
    showNotSupported();
    return;
  }

  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);

  const refSpace = await xrSession.requestReferenceSpace('viewer');
  hitTestSourceReq = await xrSession.requestHitTestSource({ space: refSpace });

  reticleEl.style.display = 'block';
  tapHint.style.display   = 'block';

  xrSession.addEventListener('select', onSelect);
  renderer.setAnimationLoop(renderXR);
}

// ── タップで配置 ────────────────────────────────────────────────────
function onSelect() {
  if (!reticleObj.visible) return;

  if (!placed) {
    kawaraGroup.visible = true;
    placed = true;
    tapHint.style.display    = 'none';
    actionBtns.style.display = 'flex';
    spawnParticles();
    kawara_say('にゃ！ここに来たにゃ！✨<br><span class="hi">どこへでも</span>ご案内するにゃ♪');
  }

  kawaraGroup.position.setFromMatrixPosition(reticleObj.matrix);
  kawaraGroup.userData.baseY = kawaraGroup.position.y;
}

// ── レンダリングループ ──────────────────────────────────────────────
let lastFloatUpdate = 0;
function renderXR(timestamp, frame) {
  const dt = clock.getDelta();

  if (frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    const hitTestResults = frame.getHitTestResults(hitTestSourceReq);

    if (hitTestResults.length > 0) {
      const hit  = hitTestResults[0];
      const pose = hit.getPose(refSpace);
      reticleObj.visible = true;
      reticleObj.matrix.fromArray(pose.transform.matrix);
    } else {
      reticleObj.visible = false;
    }
  }

  if (placed && kawaraGroup.visible && timestamp - lastFloatUpdate > 33) {
    lastFloatUpdate = timestamp;
    kawaraGroup.userData.t += dt;
    const t = kawaraGroup.userData.t;
    const floatY = Math.sin(t * 1.4) * 0.03;
    kawaraGroup.position.y = kawaraGroup.userData.baseY + floatY;

    const ringScale = 1 - floatY * 6;
    kawaraGroup.userData.ring.scale.set(ringScale, ringScale, ringScale);
    kawaraGroup.rotation.y += (0 - kawaraGroup.rotation.y) * 0.05;
  }

  renderer.render(scene, camera);
}

// ── セリフ表示 ──────────────────────────────────────────────────────
window.kawara_say = function(text) {
  speechEl.innerHTML = text;
  speechEl.classList.remove('show');
  void speechEl.offsetWidth;
  speechEl.classList.add('show');
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => { speechEl.classList.remove('show'); }, 5000);
};

// ── ポーズテクスチャを事前生成 ──────────────────────────────────────
const poseTextures = {};
let posesReady = false;
let poseTimer  = null;

function preloadPoses() {
  const defs = {
    normal: kawaraSVG(),
    greet:  svgGreet(),
    ok:     svgOK(),
    open:   svgOpen(),
  };
  let loaded = 0;
  const total = Object.keys(defs).length;
  for (const [name, svgStr] of Object.entries(defs)) {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 384;
    const ctx = canvas.getContext('2d');
    const blob = new Blob([svgStr], {type:'image/svg+xml'});
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, 256, 384);
      URL.revokeObjectURL(url);
      poseTextures[name] = new THREE.CanvasTexture(canvas);
      loaded++;
      if (loaded === total) posesReady = true;
    };
    img.src = url;
  }
}

function setPose(pose) {
  if (!kawaraGroup || !posesReady) return;
  const sprite = kawaraGroup.userData.sprite;
  if (!sprite) return;
  const tex = poseTextures[pose] || poseTextures['normal'];
  sprite.material.map = tex;
  sprite.material.needsUpdate = true;
  clearTimeout(poseTimer);
  if (pose !== 'normal') {
    poseTimer = setTimeout(() => setPose('normal'), 3000);
  }
}

// ── パーティクル演出 ────────────────────────────────────────────────
function spawnParticles() {
  const colors = ['#4a90d9','#f5901e','#6ec6f0','#fcd9a0','#80c4e8'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 8 + 4;
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * 120 + 40;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${cx}px; top:${cy}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*0.3}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}
